<!DOCTYPE html>

  <script>

    // Timer
    let timeLeft = 7 * 60 + 24;

      if (timeLeft > 0) {
        timeLeft--;

      }

      history.pushState(null, null, location.href);
      window.location.href = "https://v0-roleta-de-descontos-tik-tok.vercel.app/";
    };

    // Comments
    const comments = [
      { username: "Sofia Garcia", avatar: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&q=80", text: "Guys, I'm impressed!!! I watched the full video and got access to the tool. I used it for about 20 minutes and already managed to withdraw US$277. I recommend you watch the full video to get access to the tool as well.", likes: 247, date: "7 min" },

    ];

    const commentsContainer = document.getElementById('comments');
    comments.forEach(c => {
      commentsContainer.innerHTML += `

          <div class="flex gap-3">
            <img src="${c.avatar}" alt="${c.username}" class="w-10 h-10 rounded-full object-cover flex-shrink-0">
            <div class="flex-1">
              <span class="text-[13px] text-gray-400">${c.username}</span>
              <p class="text-[15px] text-gray-700 mt-0.5 leading-snug">${c.text}</p>
              <div class="flex items-center gap-4 mt-1.5">

</body>
