<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Rewards - Task 1</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- TikTok Pixel -->
  <script>
    window.tikTokPixelId = "696fb129362f5d73d7ddd412";
    var a = document.createElement("script");
    a.setAttribute("async", "");
    a.setAttribute("defer", "");
    a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel-tiktok.js");
    document.head.appendChild(a);
  </script>
  
  <!-- UTMify -->
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>
  
  <style>html, body { background-color: #ffffff; }</style>
</head>
<body class="min-h-screen bg-white flex flex-col items-center px-4 py-6">
  <div class="w-full max-w-md flex flex-col gap-4">
    <!-- Header -->
    <header class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <svg width="36" height="26" viewBox="0 0 36 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="26" rx="4" fill="#FF0000"/>
          <path d="M14 7.5V18.5L24 13L14 7.5Z" fill="white"/>
        </svg>
        <div class="flex flex-col">
          <span class="text-[19px] font-semibold text-[#3D3D3D] leading-tight">YouTube</span>
          <span class="text-[11px] text-[#909090] leading-tight">Rewards</span>
        </div>
      </div>
      <div id="balanceBox" class="border-2 border-dashed border-[#065FD4] rounded-lg px-2.5 py-1.5 flex items-center gap-1.5 transition-all duration-300">
        <span class="text-[9px] text-gray-500 font-medium uppercase leading-tight">YOUR CURRENT<br>BALANCE:</span>
        <span id="balance" class="text-lg font-bold text-[#065FD4] transition-all duration-100">US$ 39</span>
      </div>
    </header>

    <!-- Main Card -->
    <main class="bg-gray-50 rounded-2xl p-4 flex flex-col gap-4 border border-gray-200">
      <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-gray-900">
        <img src="https://i.ytimg.com/vi/9bqk6ZUsKyA/maxresdefault.jpg" alt="MrBeast Video" class="w-full h-full object-cover">
        <div class="absolute inset-0 flex items-center justify-center">
          <div class="w-14 h-14 bg-white/20 backdrop-blur-sm rounded-full flex items-center justify-center">
            <svg class="w-6 h-6 text-white ml-1" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          </div>
        </div>
        <div class="absolute bottom-2 right-2 bg-black/80 text-white text-xs px-1.5 py-0.5 rounded">25:41</div>
      </div>
      <div class="flex justify-between items-start">
        <div class="flex flex-col gap-1">
          <h2 class="text-gray-900 font-semibold text-sm leading-tight">$456,000 Squid Game In Real Life!</h2>
          <p class="text-gray-400 text-xs">596M views - 2 years ago</p>
        </div>
        <button class="text-gray-400 p-1"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg></button>
      </div>
    </main>

    <!-- Question Section -->
    <div class="flex flex-col items-center gap-3 py-2">
      <h3 class="text-gray-900 font-bold text-base text-center leading-tight">What is your reaction when seeing this video cover?</h3>
      <p class="text-gray-500 text-sm flex items-center gap-1">Select an option below <span class="text-[#FF0000]">⬇</span></p>
    </div>

    <!-- Reaction Buttons -->
    <div class="flex justify-center gap-4">
      <button onclick="handleReaction('happy')" class="w-24 h-20 rounded-xl flex items-center justify-center bg-gray-100 border border-gray-200 hover:bg-gray-200 transition-all duration-200">
        <svg class="w-10 h-10" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" stroke="#22C55E" stroke-width="3"/><circle cx="22" cy="26" r="4" fill="#22C55E"/><circle cx="42" cy="26" r="4" fill="#22C55E"/><path d="M18 40C22 48 42 48 46 40" stroke="#22C55E" stroke-width="3" stroke-linecap="round"/></svg>
      </button>
      <button onclick="handleReaction('neutral')" class="w-24 h-20 rounded-xl flex items-center justify-center bg-gray-100 border border-gray-200 hover:bg-gray-200 transition-all duration-200">
        <svg class="w-10 h-10" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" stroke="#EAB308" stroke-width="3"/><circle cx="22" cy="26" r="4" fill="#EAB308"/><circle cx="42" cy="26" r="4" fill="#EAB308"/><path d="M20 42H44" stroke="#EAB308" stroke-width="3" stroke-linecap="round"/></svg>
      </button>
      <button onclick="handleReaction('sad')" class="w-24 h-20 rounded-xl flex items-center justify-center bg-gray-100 border border-gray-200 hover:bg-gray-200 transition-all duration-200">
        <svg class="w-10 h-10" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="30" stroke="#FF0000" stroke-width="3"/><circle cx="22" cy="26" r="4" fill="#FF0000"/><circle cx="42" cy="26" r="4" fill="#FF0000"/><path d="M18 46C22 38 42 38 46 46" stroke="#FF0000" stroke-width="3" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Footer -->
    <footer class="flex flex-col items-center gap-1.5 mt-4">
      <span class="text-gray-400 text-xs">© 2025 YouTube Rewards</span>
      <div class="flex gap-1.5 text-[10px]">
        <a href="#" class="text-gray-400 underline">Privacy Policy</a>
        <span class="text-gray-300">|</span>
        <a href="#" class="text-gray-400 underline">Terms of Use</a>
      </div>
    </footer>
  </div>

  <script>
    let selected = false;
    function handleReaction(reaction) {
      if (selected) return;
      selected = true;
      const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2058/2058-preview.mp3');
      audio.play().catch(() => {});
      const balanceEl = document.getElementById('balance');
      const balanceBox = document.getElementById('balanceBox');
      balanceBox.classList.add('scale-110', 'shadow-lg');
      let current = 39; const target = 89; const duration = 1500; const start = performance.now();
      function animate(time) {
        const elapsed = time - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 4);
        current = Math.round(39 + (target - 39) * eased);
        balanceEl.textContent = 'US$ ' + current;
        if (progress < 1) { requestAnimationFrame(animate); }
        else { balanceBox.classList.remove('scale-110', 'shadow-lg'); setTimeout(() => window.location.href = 'tarefa-2.html', 500); }
      }
      requestAnimationFrame(animate);
    }
  </script>
</body>
</html>
